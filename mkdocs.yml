site_name: 我的知识库
site_description: 个人笔记仓库
site_url: https://pklwj.github.io/wiki/  # 部署后替换为你的域名
site_author: pklwj

# 主题核心配置（界面+功能）
theme:
  name: material
  language: zh  # 中文界面
  features:
    # 导航体验优化（Obsidian 兼大标题顶栏完美版）
    - navigation.tabs           # 核心：顶部标签页导航
    - navigation.tabs.sticky    # 标签页滚动时固定在头部
    - navigation.path           # 核心：点击新文件夹时自动折叠其他无关文件夹
    - navigation.indexes        # 支持点击分类直接看索引页
    - navigation.top            # 滚动到顶部按钮
    
    # 代码块超级增强
    - content.code.copy         # 一键复制代码按钮
    - content.code.annotate     # 代码注释标注（支持富文本）
    - content.code.select       # 代码块文本选择优化
    - content.code.wordwrap     # 代码自动换行（解决横向滚动）
    
    # 搜索功能优化
    - search.suggest            # 搜索建议
    - search.highlight          # 搜索结果高亮
    - search.share              # 搜索结果分享
    
    # 其他体验增强
    - content.action.edit       # 编辑页面按钮
    - content.action.view       # 查看源码按钮
    - header.autohide           # 滚动时自动隐藏头部
    - toc.follow                # 右侧大纲跟随滚动

# 暗黑/浅色模式自动适配
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo           
      accent: blue              
      toggle:
        icon: material/brightness-7
        name: 切换到暗黑模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

# 插件配置
plugins:
  - search:                     
      lang:
        - zh
        - en
      indexing: "full"          
  - awesome-pages:              
      collapse_single_pages: true  # 折叠只有一个页面的目录
      order: "asc"              
      sort_type: "natural"

markdown_extensions:
  # 1. 语法高亮核心插件
  - pymdownx.highlight:
      anchor_linenums: true     # 点击代码行号时，URL 会变成对应行号的锚点
      line_spans: __ln
      pygments_style: material  # 使用优雅的 Material 经典高亮配色
  
  # 2. 内联代码高亮（支持在正文中高亮类似 `docker run` 的短代码）
  - pymdownx.inlinehilite       
  
  # 3. 增强型代码块（满血复活一键复制、行号等核心功能）
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid         # 顺便帮你开启了 Mermaid 流程图支持
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format